<!DOCTYPE html>
<html>

<head>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <title>Mameeenn/まめーん</title>
  <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon">
  <meta name="description" content="Korockle Playground.">
  <link rel="stylesheet" href="/main.css">
  <link rel="stylesheet" href="./multi.css">
  <meta name="viewport" content="width=device-width,initial-scale=0.8">
  <script src="https://colxi.info/midi-parser-js/src/main.js"></script>

  <script src="/base.js"></script>
  <script src="./multi.js" type="module"></script>
</head>

<body>
  <div id="content">
    <div class="title">@korockle.multi.title</div>
    <div id="connect-info"></div>
    <button id="connect">@korockle.multi.add</button>

    <div id="korockle-count-text"></div>
    <div class="title-smaller">@korockle.melody</div>
    <button id="melody-play">@korockle.multi.play-all</button>
    <button id="melody-stop">@korockle.multi.stop-all</button>
    <button id="melody-sequence-writer">
      @korockle.multi.melody-sequence-writer
    </button>

    <div class="title-smaller">@korockle.program</div>
    <button id="melody-play">@korockle.program-run</button>
  </div>
  <div id="sequence-writer-ui-wrapper" class="modal-wrapper" style="--bg: #dfd;--color: #000;">
    <div id="sequence-writer-ui" class="modal-ui">
      <div class="title-smaller">@korockle.multi.seqwriter.title</div>
      <span>Colomn.</span>
      <input type="number" id="sequence-writer-number" min="1" max="1" step="1" value="1" />
      <button id="sequence-writer-all">@korockle.multi.seqwriter.all</button>
      <table id="sequence-writer-table"></table>
    </div>
    <button id="sequence-writer-ui-close" title="Close(ESC)" class="modal-close">✕</button>
    <input type="file" id="sequence-writer-melody-input" accept=".mdp" style="display: none" />
  </div>
</body>

</html>
